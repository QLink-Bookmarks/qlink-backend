name: Kotlin CI with Gradle and PostgreSQL

on:
  pull_request:
    branches:
      - main
      - "feat/**"
      - "refactor/**"
      - "fix/**"
      - "codex/**"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: corretto

      - name: Gradle 캐싱
        uses: gradle/actions/setup-gradle@v4.4.0
        with:
          cache-read-only: "${{ github.event.repository != null && github.base_ref != github.event.repository.default_branch }}"

      - name: 빌드 권한 부여
        run: chmod +x gradlew

      - name: Spotless 적용
        run: ./gradlew spotlessApply

      - name: 프로젝트 빌드
        run: ./gradlew build

      - name: 자코코 리포트 작성
        uses: madrapps/jacoco-report@v1.6.1
        with:
          title: 📊 Jacoco Test Coverage
          paths: ${{ github.workspace }}/build/jacocoReports/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 50
          min-coverage-changed-files: 50
          update-comment: true

      - name: 테스트 리포트 작성
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"
          comment: "true"
          detailed_summary: "true"
          skip_success_summary: "true"
          follow_symlink: "true"
