name: 애플리케이션 배포 파이프라인

on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
      deployment_enabled:
        required: false
        default: false
        type: boolean
      ecr_repository_name:
        required: true
        type: string
      ecr_repository_tag_name:
        required: true
        type: string
      rds_db_name:
        required: true
        type: string
      rds_username:
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      SUBMODULES_SECRET:
        required: true
      TF_VAR_DB_PASSWORD:
        required: true

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    if: ${{ inputs.deployment_enabled }}
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SUBMODULES_SECRET }}
          submodules: true

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: corretto

      - name: Gradle 캐싱
        uses: gradle/actions/setup-gradle@v4.4.0

      - name: 빌드 권한 부여
        run: chmod +x gradlew

      - name: Fat jar 빌드
        run: ./gradlew shadowJar

      - name: AWS Credentials 설정
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 이미지 태그 계산
        id: image_tag
        run: echo "value=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Docker 이미지 빌드 및 푸시
        env:
          ECR_REGISTRY: ${{ steps.login_ecr.outputs.registry }}
          ECR_REPOSITORY_NAME: ${{ inputs.ecr_repository_name }}
          IMAGE_TAG: ${{ steps.image_tag.outputs.value }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY_NAME:$IMAGE_TAG"
          docker buildx build \
            --platform linux/arm64 \
            --build-arg APP_ENV=${{ inputs.env }} \
            --tag "$IMAGE_URI" \
            --push \
            .

      - name: Terraform 설치
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (Remote Backend)
        working-directory: terraform/${{ inputs.env }}
        run: |
          terraform init \
            -reconfigure \
            -input=false

      - name: Terraform Plan
        working-directory: terraform/${{ inputs.env }}
        env:
          TF_IN_AUTOMATION: "true"
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_rds_db_name: ${{ inputs.rds_db_name }}
          TF_VAR_rds_username: ${{ inputs.rds_username }}
          TF_VAR_ecs_image_tag: ${{ steps.image_tag.outputs.value }}
          TF_VAR_ecr_repository_name: ${{ inputs.ecr_repository_name }}
          TF_VAR_ecr_repository_tag_name: ${{ inputs.ecr_repository_tag_name }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -target=module.ecs.aws_ecs_task_definition.qlink_task \
            -target=module.ecs.aws_ecs_service.qlink_ecs_service

      - name: Terraform Apply
        working-directory: terraform/${{ inputs.env }}
        env:
          TF_IN_AUTOMATION: "true"
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_rds_db_name: ${{ inputs.rds_db_name }}
          TF_VAR_rds_username: ${{ inputs.rds_username }}
          TF_VAR_ecs_image_tag: ${{ steps.image_tag.outputs.value }}
          TF_VAR_ecr_repository_name: ${{ inputs.ecr_repository_name }}
          TF_VAR_ecr_repository_tag_name: ${{ inputs.ecr_repository_tag_name }}
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            tfplan
