ktor:
  deployment:
    port: 8080
  application:
    modules:
      - com.qlink.ApplicationKt.module

dataSource:
  jdbcUrl: jdbc:postgresql://localhost:5432/qlink?currentSchema=qlink_local
  username: local
  password: 1234
  driverClassName: org.postgresql.Driver

flyway:
  schema: qlink_local
  locations:
    - db/migration
    - db/data

http:
  cors:
    methods:
      - OPTIONS
      - HEAD
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
    headers:
      - Authorization
      - Content-Type
      - Accept
      - Origin
      - X-Requested-With
      - MyCustomHeader
    allowCredentials: true
    allowNonSimpleContentTypes: true
    anyHost: true
    hosts:
      - localhost:8081
  defaultHeaders:
    engine:
      name: X-Engine
      value: Ktor
  documentation:
    openApiPath: openapi
    swaggerPath: docs
    redocPath: redoc

monitoring:
  metricsPath: /metrics-micrometer

notification:
  expo:
    sendUrl: https://exp.host/--/api/v2/push/send
    accessToken: ""
  fcm:
    serviceAccountJson: ""

logging:
  http:
    slowThresholdMs: 1000
    maxLength: 4096
    traceIdLength: 12
    sensitiveKeys:
      - accessToken
      - refreshToken
      - Authorization
      - apiKey

security:
  aiApiKeyEncryptionKeyBase64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  access:
    duration: 900
  refresh:
    duration: 1209600
  jwt:
    secret: Y1d4cGJtc3RZbTl2YTIxaGNtdHo=
