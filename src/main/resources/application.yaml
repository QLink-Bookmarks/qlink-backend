ktor:
  deployment:
    port: 8080
  application:
    modules:
      - com.qlink.ApplicationKt.module

dataSource:
  jdbcUrl: jdbc:postgresql://localhost:5432/qlink?currentSchema=qlink_local
  username: local
  password: 1234
  driverClassName: org.postgresql.Driver

flyway:
  schema: qlink_local
  locations:
    - db/migration
    - db/data

http:
  cors:
    methods:
      - OPTIONS
      - HEAD
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
    headers:
      - Authorization
      - Content-Type
      - Accept
      - Origin
      - X-Requested-With
      - MyCustomHeader
    allowCredentials: true
    allowNonSimpleContentTypes: true
    anyHost: true
    hosts:
      - localhost:8081
  defaultHeaders:
    engine:
      name: X-Engine
      value: Ktor
  documentation:
    openApiPath: openapi
    swaggerPath: docs
    redocPath: redoc

monitoring:
  metricsPath: /metrics-micrometer

logging:
  http:
    slowThresholdMs: 1000
    maxLength: 4096
    traceIdLength: 12
    sensitiveKeys:
      - accessToken
      - refreshToken

security:
  jwt:
    secret: Y1d4cGJtc3RZbTl2YTIxaGNtdHo=

ai:
  defaultProvider: GEMINI
  gemini:
    apiKey: "$GEMINI_API_KEY:"
    model: gemini-2.0-flash
    baseUrl: https://generativelanguage.googleapis.com
  openai:
    apiKey: "$OPENAI_API_KEY:"
    model: gpt-4o-mini
    baseUrl: https://api.openai.com
